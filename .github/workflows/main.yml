name: Prod Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Login to Docker Hub
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build & push backend
      - name: Build backend
        run: |
          docker build -t tisheel/backend:latest ./backend
          docker push tisheel/backend:latest

      # 🏗 Build & push frontend
      - name: Build frontend
        run: |
          docker build -t tisheel/frontend:latest ./frontend
          docker push tisheel/frontend:latest

      # 🚀 Deploy to VM
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SECRET_KEY }}
          script: |
            cd /home/${{ secrets.VM_USER }}/app

            docker compose pull
            docker compose up -d

            docker image prune -f